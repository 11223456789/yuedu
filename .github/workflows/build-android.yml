
name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  checks: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.2'
        channel: 'stable'
        cache: true

    - name: Install dependencies
      run: flutter pub get

    - name: Clean Gradle cache
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf android/.gradle/
        rm -rf android/app/.gradle/

    - name: Set up JDK 11
      id: setup-java
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
        packages: 'platforms;android-35 build-tools;35.0.0'

    - name: Build Android APK (Debug)
      env:
        JAVA_HOME: ${{ steps.setup-java.outputs.java-home }}
      run: |
        export JAVA_HOME=${{ steps.setup-java.outputs.java-home }}
        flutter build apk --debug --obfuscate --split-debug-info=build/debug-info

    - name: Build Android APK (Release)
      env:
        JAVA_HOME: ${{ steps.setup-java.outputs.java-home }}
      run: |
        export JAVA_HOME=${{ steps.setup-java.outputs.java-home }}
        flutter build apk --release --obfuscate --split-debug-info=build/debug-info

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: PeiyuBookhouse-Debug-APK
        path: build/app/outputs/flutter-apk/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: PeiyuBookhouse-Release-APK
        path: build/app/outputs/flutter-apk/app-release.apk

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: 佩宇书屋 v1.0.${{ github.run_number }}
        body: |
          ## 佩宇书屋 - 跨平台阅读应用
          
          ### 功能特点
          - 鎏金主题设计
          - 书源管理（支持Legado格式）
          - 网络书籍搜索和阅读
          - 本地书籍解析（TXT/EPUB）
          - 五种翻页动画
          - 阅读引擎和分页算法
          - 替换净化规则引擎
          - 简繁转换
          - 系统 TTS 和 HTTP TTS 朗读
          - CloneTTS 集成支持
          - 音频播放服务
          - 离线缓存服务
          
          ### 安装说明
          1. 下载 APK 文件
          2. 在 Android 设备上安装
          3. 允许"未知来源"
          
          ### 使用方法
          1. 打开 APP，点击"书源"
          2. 导入书源 JSON
          3. 搜索并添加书籍到书架
          4. 开始阅读
        files: |
          build/app/outputs/flutter-apk/app-debug.apk
          build/app/outputs/flutter-apk/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

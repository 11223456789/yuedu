
name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  checks: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.2'
        channel: 'stable'
        cache: true

    - name: Install dependencies
      run: flutter pub get

    - name: Clean Gradle cache
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf android/.gradle/
        rm -rf android/app/.gradle/

    - name: Set up JDK 17
      id: setup-java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Build Android APK (Debug)
      env:
        JAVA_HOME: ${{ steps.setup-java.outputs.java-home }}
      run: |
        export JAVA_HOME=${{ steps.setup-java.outputs.java-home }}
        flutter build apk --debug --obfuscate --split-debug-info=build/debug-info

    - name: Build Android APK (Release)
      env:
        JAVA_HOME: ${{ steps.setup-java.outputs.java-home }}
      run: |
        export JAVA_HOME=${{ steps.setup-java.outputs.java-home }}
        flutter build apk --release --obfuscate --split-debug-info=build/debug-info

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: PeiyuBookhouse-Debug-APK
        path: build/app/outputs/flutter-apk/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: PeiyuBookhouse-Release-APK
        path: build/app/outputs/flutter-apk/app-release.apk

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: 佩宇书屋 v1.0.${{ github.run_number }}
        body: |
          ## 佩宇书屋 - 跨平台阅读应用
          
          ### 功能特点
          - 鎏金主题设计
          - 书源管理（支持Legado格式）
          - 网络书籍搜索和阅读
          - 本地书籍解析（TXT/EPUB）
          - 5种翻页动画（覆盖/仿真/滑动/滚动/无动画）
          - 阅读引擎和分页算法
          - 替换净化规则引擎
          - 简繁转换
          - 系统 TTS 和 HTTP TTS 朗读
          - CloneTTS 集成支持
          - 音频播放服务
          - 离线缓存服务
          - 11种阅读主题切换（白天/夜间/护眼/羊皮纸/深蓝/粉色/咖啡/森林/薰衣草/薄荷/黄昏）
          - 15种字体选择（系统/思源宋体/思源黑体/霞鹜文楷/站酷文艺/阿里巴巴/仿宋/新魏/楷体/宋体/黑体/微软雅黑/华文细黑/华文楷体/华文宋体）
          - 阅读进度显示
          - 智能手势翻页（点击左右区域/滑动手势）
          - 综合阅读设置面板（字体/行间距/主题/翻页模式）
          - 书架阅读进度可视化
          - 书签管理功能（添加/删除/跳转）
          - 缓存管理（清理书籍/图片缓存）
          - 备份与恢复功能
          - 书籍更新检查（自动检测新章节）
          - 阅读统计功能（时长/字数/排行）
           - 自动阅读时间记录（每30秒保存）
           - 音量键翻页功能
           - 阅读进度条可视化
           - 自动夜间模式（可设置时间段）
           - 书架空状态优化（添加快速操作按钮）
           - 章节预加载和缓存机制
           - 阅读完成提示
           - 阅读分享功能（复制/微信/生成图片）
           - 搜索历史记录和热门搜索
           - 智能搜索结果排序（完全匹配/包含匹配/书源数量）
           - 精确搜索模式
          
          ### 安装说明
          1. 下载 APK 文件
          2. 在 Android 设备上安装
          3. 允许"未知来源"
          
          ### 使用方法
          1. 打开 APP，点击"书源"
          2. 导入书源 JSON
          3. 搜索并添加书籍到书架
          4. 开始阅读
        files: |
          build/app/outputs/flutter-apk/app-debug.apk
          build/app/outputs/flutter-apk/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
